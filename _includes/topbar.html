<script>
  (function () {
    var path = (location.pathname || "").replace(/\/+$/, "");
    var leaf = path.substring(path.lastIndexOf("/") + 1) || "index.html";
    var key;
    if (leaf === "" || leaf === "index.html") key = "home";
    else if (leaf.indexOf("papers") === 0 || path.indexOf("/papers/") !== -1) key = "papers";
    else if (leaf.indexOf("about") === 0)  key = "about";
    else if (leaf.indexOf("submit") === 0) key = "submit";
    if (!key) return;
    var links = document.querySelectorAll(".wpcs-nav a[data-page]");
    for (var i = 0; i < links.length; i++) {
      if (links[i].getAttribute("data-page") === key) {
        links[i].classList.add("is-active");
      }
    }
  })();
</script>
