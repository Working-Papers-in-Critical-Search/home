project:
  type: website
  output-dir: _site
  resources:
    - "google*.html"   # Google Search Console verification

website:
  title: "Working Papers in Critical Search"
  description: "A home for history that shows its work"
  site-url: https://working-papers-in-critical-search.github.io/home/
  repo-url: https://github.com/Working-Papers-in-Critical-Search/home

  # No navbar / page-footer — we inject custom chrome via includes.
  # No giscus — removed per design.
  # Hypothes.is is scoped to paper detail pages via per-page front-matter.

format:
  html:
    theme:
      - cosmo
      - _tokens.scss
      - _custom.scss
    toc: false
    anchor-sections: false
    title-block-style: none
    smooth-scroll: true
    link-external-newwindow: true
    include-in-header:
      - _includes/fonts.html
    include-before-body:
      - _includes/topbar.html
    include-after-body:
      - _includes/footer.html

execute:
  freeze: auto
